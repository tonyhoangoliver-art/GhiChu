<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Keep Clone</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="header-left">
        <h1 class="logo">Keep</h1>
        <button class="new-note-btn" onclick="createNote()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM14 14H10V10H14V14ZM14 8H10V6H14V8Z" fill="currentColor"/>
          </svg>
          <span>Take a note...</span>
        </button>
      </div>
      <div class="header-right">
        <div class="search-box">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.5 14H14.71L14.43 13.73C15.41 12.59 16 11.11 16 9.5C16 5.91 13.09 3 9.5 3C5.91 3 3 5.91 3 9.5C3 13.09 5.91 16 9.5 16C11.11 16 12.59 15.41 13.73 14.43L14 14.71V15.5L19 20.49L20.49 19L15.5 14ZM9.5 14C7.01 14 5 11.99 5 9.5C5 7.01 7.01 5 9.5 5C11.99 5 14 7.01 14 9.5C14 11.99 11.99 14 9.5 14Z" fill="currentColor"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Search" oninput="searchNotes()">
        </div>
        <select id="sortSelect" class="sort-select" onchange="changeSort()">
          <option value="default">Mặc định</option>
          <option value="newest">Ngày tạo mới nhất</option>
          <option value="oldest">Ngày tạo cũ nhất</option>
          <option value="title-asc">Tiêu đề (A-Z)</option>
          <option value="title-desc">Tiêu đề (Z-A)</option>
        </select>
      </div>
    </div>
  </header>

  <main class="notes-container" id="notesContainer">
    <div class="notes-grid" id="notesGrid"></div>
  </main>

  <div class="note-editor hidden" id="noteEditor">
    <div class="editor-container">
      <input type="text" id="noteTitle" placeholder="Title" class="note-title-input">
      <textarea id="noteContent" placeholder="Take a note..." class="note-content-input"></textarea>
      <div class="editor-actions">
        <div class="color-picker">
          <button class="color-btn" style="background-color: #FFFFFF;" data-color="#FFFFFF" onclick="setNoteColor('#FFFFFF')"></button>
          <button class="color-btn" style="background-color: #F28B82;" data-color="#F28B82" onclick="setNoteColor('#F28B82')"></button>
          <button class="color-btn" style="background-color: #FABF8F;" data-color="#FABF8F" onclick="setNoteColor('#FABF8F')"></button>
          <button class="color-btn" style="background-color: #FFF799;" data-color="#FFF799" onclick="setNoteColor('#FFF799')"></button>
          <button class="color-btn" style="background-color: #C2F5AF;" data-color="#C2F5AF" onclick="setNoteColor('#C2F5AF')"></button>
          <button class="color-btn" style="background-color: #AECBFA;" data-color="#AECBFA" onclick="setNoteColor('#AECBFA')"></button>
          <button class="color-btn" style="background-color: #D9A8F7;" data-color="#D9A8F7" onclick="setNoteColor('#D9A8F7')"></button>
          <button class="color-btn" style="background-color: #FDCFE8;" data-color="#FDCFE8" onclick="setNoteColor('#FDCFE8')"></button>
        </div>
        <button class="close-btn" onclick="closeEditor()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"/>
          </svg>
        </button>
        <button class="save-btn" onclick="saveNote()">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
